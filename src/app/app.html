<!-- Cabecera con navegación para escritorio -->
<header class="cabecera">
  <h1 class="titulo-principal">Bitcoin Educación</h1>
  <nav class="navegacion-escritorio">
    <ul class="menu">
      <li>
        <a routerLink="/" routerLinkActive="active" (click)="navigateTo('/')">
          <fa-icon [icon]="faHome"></fa-icon><span>Inicio</span>
        </a>
      </li>
      <li>
        <a
          routerLink="/wallets"
          routerLinkActive="active"
          (click)="navigateTo('/wallets')"
        >
          <fa-icon [icon]="faWallet"></fa-icon><span>Wallets</span>
        </a>
      </li>
      <li>
        <a
          routerLink="/nodos"
          routerLinkActive="active"
          (click)="navigateTo('/nodos')"
        >
          <fa-icon [icon]="faServer"></fa-icon><span>Nodos</span>
        </a>
      </li>
      <li>
        <a
          routerLink="/mineria"
          routerLinkActive="active"
          (click)="navigateTo('/mineria')"
        >
          <fa-icon [icon]="faMicrochip"></fa-icon><span>Minería</span>
        </a>
      </li>
      <li>
        <a
          routerLink="/seguridad"
          routerLinkActive="active"
          (click)="navigateTo('/seguridad')"
        >
          <fa-icon [icon]="faLock"></fa-icon><span>Seguridad</span>
        </a>
      </li>
    </ul>
  </nav>
</header>

<!-- Contenido principal -->
<main class="contenedor-principal">
  <router-outlet></router-outlet>
</main>

        (click)="navigateTo('/wallets')"

    <li>

        routerLink="/nodos"
        routerLinkActive="active"
        (click)="navigateTo('/nodos')"
      >
        <fa-icon [icon]="faServer"></fa-icon><span>Nodos</span>
      </a>
    </li>
    <li>
      <a
        routerLink="/mineria"
        routerLinkActive="active"
        (click)="navigateTo('/mineria')"
      >
        <fa-icon [icon]="faMicrochip"></fa-icon><span>Minería</span>
      </a>
    </li>
    <li>
      <a
        routerLink="/seguridad"
        routerLinkActive="active"
        (click)="navigateTo('/seguridad')"
      >
        <fa-icon [icon]="faLock"></fa-icon><span>Seguridad</span>
      </a>
    </li>
  </ul>
</nav>

<!-- Pie de página -->
<footer class="pie-pagina">

</footer>
